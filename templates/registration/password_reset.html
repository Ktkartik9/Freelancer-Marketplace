{% extends 'base.html' %}
{% block content %}
<section class="section-padding flex-center" style="min-height: calc(100vh - var(--navbar-height)); background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
    <div class="card glass shadow-xl fade-in-up" style="max-width: 480px; width: 100%; padding: 3.5rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div class="logo-icon" style="font-size: 3.5rem; margin-bottom: 1rem;">🔑</div>
            <h1 style="font-size: 2.5rem; margin-bottom: 0.75rem;">Reset Password</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Enter your email to receive a reset link</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="far fa-envelope" style="position: absolute; left: 1.25rem; top: 1.15rem; color: var(--text-muted);"></i>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" style="padding-left: 3rem;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; font-size: 1.1rem; padding: 1rem;">
                Send Reset Link <i class="fas fa-paper-plane" style="margin-left: 0.75rem;"></i>
            </button>
        </form>

        <div style="margin-top: 2.5rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Back to <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 700;">Sign In</a>
        </div>
    </div>
</section>
{% endblock %}
