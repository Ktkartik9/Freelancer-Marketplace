{% extends 'base.html' %}
{% block content %}
<section class="section-padding flex-center" style="min-height: calc(100vh - var(--navbar-height)); background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
    <div class="card glass shadow-xl fade-in-up" style="max-width: 480px; width: 100%; padding: 3.5rem; text-align: center;">
        <div class="logo-icon" style="font-size: 4rem; margin-bottom: 2rem; color: var(--success);">📧</div>
        <h1 style="font-size: 2.25rem; margin-bottom: 1rem;">Email Sent!</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
            We've sent you an email with instructions for resetting your password. Please check your inbox and spam folder.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%;">Return to Login</a>
    </div>
</section>
{% endblock %}
